<h1>Parent: {{message}}</h1>
<button (click)='loadLazyComponent()'>Parent Button</button>

<div>
  <input (change)="onChange($event)" type="text">
  <button (click)='toggleComponent()'>Toggle Child</button>
</div>

@if (showChildComponent) {
  <app-child-component [incomingMessage]="message" (outgoingMessage)="resetMessage($event)"></app-child-component>
}

<p>Keyboard Test</p>
<p>Input Text: {{inputText}}</p>
<p>Form Values: {{inputForm.value}}</p>
<input placeholder="Enter text" [(ngModel)]="inputText" #inputForm="ngModel" required (click)="inputClicked=true;">
@if (inputClicked) {
  <div>
    <p>Input Clicked</p>
    <p>Focused Pokemon: {{focusedPokemon}}</p>
    @for (pokemon of pokemonTeam; track pokemon) {
      <div (focus)="onFocus(pokemon)" (click)="onClick(pokemon)">
        <p>{{pokemon}}</p>
      </div>
    }
  </div>
}
